name: python-ci

# Runs pytest on anything that could break the Python backend.
# Fast enough to run on every PR + push-to-main.

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "solver/**"
      - "export/**"
      - "tests/**"
      - "config.py"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - "solver/**"
      - "export/**"
      - "tests/**"
      - "config.py"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"

  # Manual trigger from the Actions tab.
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
